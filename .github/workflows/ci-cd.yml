name: CollabSpace CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ----------------------------------------------------
  # CONTINUOUS INTEGRATION (CI)
  # ----------------------------------------------------
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Client Verification
      - name: Install Frontend Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Frontend Linting
        working-directory: ./client
        run: npm run lint || echo "Linting warnings found, continuing pipeline..."

      - name: Build Frontend static assets
        working-directory: ./client
        run: npm run build

      # Server Verification
      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./server
        run: npm run test

  # ----------------------------------------------------
  # DOCKER AUTOMATION
  # ----------------------------------------------------
  docker:
    name: Docker Build, Tag & Push
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/collabspace-server:latest
            ${{ secrets.DOCKER_USERNAME }}/collabspace-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/collabspace-client:latest
            ${{ secrets.DOCKER_USERNAME }}/collabspace-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------
  # CONTINUOUS DEPLOYMENT (CD)
  # ----------------------------------------------------
  cd:
    name: Continuous Deployment
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Kubeconfig Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      # Create Secrets Namespace & Credentials dynamically if not exist
      - name: Deploy Kubernetes Secrets
        run: |
          kubectl create secret generic collabspace-secrets \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=jwt-refresh-secret="${{ secrets.JWT_REFRESH_SECRET }}" \
            --from-literal=cloudinary-cloud-name="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            --from-literal=cloudinary-api-key="${{ secrets.CLOUDINARY_API_KEY }}" \
            --from-literal=cloudinary-api-secret="${{ secrets.CLOUDINARY_API_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Replace `${DOCKER_USERNAME}` placeholder inside YAML templates before deploying
      - name: Inject Configuration & Deploy Manifests
        run: |
          sed -i "s/\${DOCKER_USERNAME}/${{ secrets.DOCKER_USERNAME }}/g" k8s/server-deployment.yaml
          sed -i "s/\${DOCKER_USERNAME}/${{ secrets.DOCKER_USERNAME }}/g" k8s/client-deployment.yaml
          kubectl apply -f k8s/

      # Trigger rolling restart to make sure k8s pods pull the new latest image immediately
      - name: Rolling Restart Deployments
        run: |
          kubectl rollout restart deployment/server
          kubectl rollout restart deployment/client
          kubectl rollout status deployment/server
          kubectl rollout status deployment/client
