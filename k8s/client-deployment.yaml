apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: collabspace
  labels:
    app: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: collabspace-client:latest
          imagePullPolicy: IfNotPresent  # Crucial for local minikube development to use local images
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: collabspace
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: client
  type: LoadBalancer
